<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UBC CCAS Study Dashboard – Interactive Map</title>

  <!-- Leaflet core CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Unified site stylesheet -->
  <link rel="stylesheet" href="css/style.css?v=20251029" />

  <!-- Minimal page-specific styles (no header/nav styles) -->
  <style>
    /* Make the map fill the remaining viewport; remove default main padding here */
    main.map-page { padding: 0; display: flex; flex-direction: column; }
    #map { flex: 1; width: 100%; min-height: 70vh; touch-action: none; }
    #sensor-details { display: none; }

    /* Status footer at the bottom with subtle background */
    #stamp { text-align: center; padding: .5rem; font-size: .9rem;
             background: #f4f4f4; color: #333; }
             
   /* AQHI Legend */
    .aqhi-legend{
      background:#fff;
      padding:.55rem .65rem;
      border-radius:.5rem;
      box-shadow:0 2px 10px rgba(0,0,0,.15);
      font:11px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      min-width:145px;
    }
    
    /* Title + help link */
    .aqhi-legend .legend-title{
      display:flex;
      align-items:center;
      gap:.5rem;
      margin:0 0 .4rem;
    }
    
    .aqhi-legend .legend-help{
      margin-left:auto;
      font-size:.66rem;
      text-decoration:underline;
      color:inherit;
      opacity:.8;
    }
    
    .aqhi-legend .legend-help:hover,
    .aqhi-legend .legend-help:focus{
      opacity:1;
      outline-offset:2px;
    }
    
    /* Vertical rows */
    .aqhi-legend .legend-list{
      display:grid;
      gap:3px;
    }
    
    .aqhi-legend .legend-row{
      display:grid;
      grid-template-columns:14px 28px 1fr;
      align-items:center;
      gap:6px;
    }
    
    .aqhi-legend .swatch{
      display:block;
      width:14px;
      height:10px;
      border-radius:2px;
    }
    
    .aqhi-legend .legend-value{
      font-weight:600;
      color:#222;
    }
    
    .aqhi-legend .legend-band{
      color:#555;
      white-space:nowrap;
    }

  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <a href="index.html" class="logo">UBC CCAS Study Dashboard</a>
    <button class="hamburger" aria-controls="site-nav" aria-expanded="false">
      <span class="visually-hidden">Menu</span>☰
    </button>
    <nav id="site-nav" class="nav">
      <a class="nav-button" href="index.html">Home</a>
      <a class="nav-button" href="map.html" aria-current="page">Map</a>
      <a class="nav-button" href="details.html">Graphs</a>
      <a class="nav-button" href="list.html">Sensor&nbsp;List</a>
      <a class="nav-button" href="info.html">Info</a>
    </nav>
  </header>

  <main id="main" class="map-page">
    <div id="map"></div>
    <div id="sensor-details"></div>
  </main>

  <footer id="stamp" class="site-footer">Updating&hellip;</footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Map logic (ES module) -->
  <script type="module" src="js/map.js"></script>

  <!-- Timestamp fetcher -->
  <script type="module">
    import { getSensorData } from './js/data.js';
    getSensorData()
      .then(({ generated_at }) => {
        document.getElementById('stamp').textContent =
          'Last Updated ' + new Date(generated_at).toLocaleString();
      })
      .catch(() => {
        document.getElementById('stamp').textContent =
          '⚠ Unable to fetch latest data';
      });
  </script>

  <!-- Hamburger toggle -->
  <script src="js/menu.js" defer></script>
</body>
</html>
