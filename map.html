<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UBC CCAS Study Dashboard – Interactive Map</title>

  <!-- Leaflet core CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Unified site stylesheet -->
  <link rel="stylesheet" href="css/style.css?v=20251029" />

  <style>
    main.map-page {
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    #map {
      flex: 1;
      width: 100%;
      min-height: 70vh;
      touch-action: none;
    }

    #sensor-details {
      display: none;
    }

    #stamp {
      text-align: center;
      padding: .5rem;
      font-size: .9rem;
      background: #f4f4f4;
      color: #333;
    }

    /* AQHI / pollutant legend */
    .aqhi-legend {
      background: #fff;
      padding: .55rem .65rem;
      border-radius: .5rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
      font: 11px/1.25 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      min-width: 170px;
    }

    .aqhi-legend .legend-title {
      display: grid;
      grid-template-columns: 14px 52px max-content;
      align-items: center;
      gap: 6px;
      margin: 0;
    }

    .aqhi-legend .legend-toggle {
      grid-column: 1 / span 2;
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      font: inherit;
      font-weight: 600;
      color: #222;
      cursor: pointer;
      text-align: left;
    }

    .aqhi-legend .legend-help {
      grid-column: 3;
      justify-self: start;
      font-size: .66rem;
      text-decoration: underline;
      color: inherit;
      opacity: .8;
    }

    .aqhi-legend .legend-help:hover,
    .aqhi-legend .legend-help:focus {
      opacity: 1;
      outline-offset: 2px;
    }

    .aqhi-legend .legend-body {
      margin-top: .4rem;
    }

    .aqhi-legend.is-collapsed .legend-body {
      display: none;
    }

    .aqhi-legend .legend-list {
      display: grid;
      gap: 3px;
    }

    .aqhi-legend .legend-row {
      display: grid;
      grid-template-columns: 14px 52px max-content;
      align-items: center;
      gap: 6px;
    }

    .aqhi-legend .swatch {
      display: block;
      width: 14px;
      height: 10px;
      border-radius: 2px;
    }

    .aqhi-legend .legend-value {
      font-weight: 600;
      color: #222;
    }

    .aqhi-legend .legend-band {
      color: #555;
      white-space: nowrap;
    }

    .aqhi-legend .legend-note {
      margin-top: .35rem;
      color: #666;
      font-size: .66rem;
    }

    /* Make Leaflet layer control a little tidier */
    .leaflet-control-layers {
      font: 12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    @media (max-width: 767px) {
      .aqhi-legend {
        min-width: 155px;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <a href="index.html" class="logo">UBC CCAS Study Dashboard</a>
    <button class="hamburger" aria-controls="site-nav" aria-expanded="false">
      <span class="visually-hidden">Menu</span>☰
    </button>
    <nav id="site-nav" class="nav">
      <a class="nav-button" href="index.html">Home</a>
      <a class="nav-button" href="map.html" aria-current="page">Map</a>
      <a class="nav-button" href="details.html">Graphs</a>
      <a class="nav-button" href="list.html">Sensor&nbsp;List</a>
      <a class="nav-button" href="info.html">Info</a>
    </nav>
  </header>

  <main id="main" class="map-page">
    <div id="map"></div>
    <div id="sensor-details"></div>
  </main>

  <footer id="stamp" class="site-footer">Updating&hellip;</footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Inline map logic -->
  <script type="module">
    import { getSensorData } from './js/data.js';

    const map = L.map('map');

    const vchBounds = [[49.0, -123.6], [50.5, -122.0]];
    map.fitBounds(vchBounds);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    function getAQHIColor(aqhi) {
      if (aqhi <= 1) return '#67c1f1';
      if (aqhi <= 2) return '#4e95c7';
      if (aqhi <= 3) return '#396798';
      if (aqhi <= 4) return '#e7eb38';
      if (aqhi <= 5) return '#f1cb2e';
      if (aqhi <= 6) return '#e79647';
      if (aqhi <= 7) return '#dd6869';
      if (aqhi <= 8) return '#d82732';
      if (aqhi <= 9) return '#bf2733';
      return '#8b2328';
    }

    function colorFromBins(value, bins, colors) {
      if (value == null || Number.isNaN(Number(value))) return '#9aa0a6';
      const v = Number(value);

      for (let i = 0; i < bins.length; i++) {
        if (v <= bins[i]) return colors[i];
      }
      return colors[colors.length - 1];
    }

    function formatNumber(value, digits = 1) {
      if (value == null || Number.isNaN(Number(value))) return '—';
      return Number(value).toFixed(digits);
    }

    function getPollutantUnit(key) {
      switch (key) {
        case 'pm25':
          return 'µg/m³';
        case 'o3':
        case 'no2':
        case 'no':
          return 'ppb';
        case 'co':
        case 'co2':
          return 'ppm';
        default:
          return '';
      }
    }

    function canonicalPollutantName(name) {
      const raw = String(name ?? '').trim().toUpperCase();
      if (!raw) return null;
      if (raw === 'PM2.5' || raw === 'PM25' || raw === 'PM2_5') return 'pm25';
      if (raw === 'O3') return 'o3';
      if (raw === 'NO2') return 'no2';
      if (raw === 'NO') return 'no';
      if (raw === 'CO') return 'co';
      if (raw === 'CO2') return 'co2';
      return raw.toLowerCase();
    }

    function displayPollutantName(key) {
      switch (key) {
        case 'pm25': return 'PM2.5';
        case 'o3': return 'O3';
        case 'no2': return 'NO2';
        case 'no': return 'NO';
        case 'co': return 'CO';
        case 'co2': return 'CO2';
        default: return key ?? '—';
      }
    }

    function getPollutantValue(latest, key) {
      const pollutants = latest?.pollutants ?? {};
      return pollutants[key] ?? null;
    }

    function formatPrimaryPollutant(latest) {
      const primaryKey = canonicalPollutantName(
        latest?.primary ?? latest?.primary_pollutant ?? latest?.primaryPollutant
      );

      if (!primaryKey) return 'Primary Pollutant: —';

      const value = getPollutantValue(latest, primaryKey);
      const unit = getPollutantUnit(primaryKey);
      const label = displayPollutantName(primaryKey);

      if (value == null || Number.isNaN(Number(value))) {
        return `Primary Pollutant: ${label}`;
      }

      return `Primary Pollutant: ${label} (${formatNumber(value)} ${unit})`;
    }

    const pollutantScaleColors = [
      '#67c1f1',
      '#4e95c7',
      '#396798',
      '#e7eb38',
      '#f1cb2e',
      '#dd6869'
    ];

    const LAYER_CONFIG = {
      aqhi: {
        label: 'AQHI',
        getValue: latest => latest?.aqhi ?? null,
        getColor: value => getAQHIColor(value),
        legendRows: [
          { color: getAQHIColor(1), label: '1', band: 'Low' },
          { color: getAQHIColor(2), label: '2', band: 'Low' },
          { color: getAQHIColor(3), label: '3', band: 'Low' },
          { color: getAQHIColor(4), label: '4', band: 'Moderate' },
          { color: getAQHIColor(5), label: '5', band: 'Moderate' },
          { color: getAQHIColor(6), label: '6', band: 'Moderate' },
          { color: getAQHIColor(7), label: '7', band: 'High' },
          { color: getAQHIColor(8), label: '8', band: 'High' },
          { color: getAQHIColor(9), label: '9', band: 'High' },
          { color: getAQHIColor(10.5), label: '10+', band: 'Very High' }
        ],
        note: ''
      },

      pm25: {
        label: 'PM2.5',
        getValue: latest => getPollutantValue(latest, 'pm25'),
        getColor: value => colorFromBins(value, [5, 15, 25, 35, 55], pollutantScaleColors),
        legendRows: [
          { color: pollutantScaleColors[0], label: '0-5', band: 'µg/m³' },
          { color: pollutantScaleColors[1], label: '5–15', band: 'µg/m³' },
          { color: pollutantScaleColors[2], label: '15–25', band: 'µg/m³' },
          { color: pollutantScaleColors[3], label: '25–35', band: 'µg/m³' },
          { color: pollutantScaleColors[4], label: '35–55', band: 'µg/m³' },
          { color: pollutantScaleColors[5], label: '55+', band: 'µg/m³' }
        ],
        note: ''
      },

      o3: {
        label: 'O3',
        getValue: latest => getPollutantValue(latest, 'o3'),
        getColor: value => colorFromBins(value, [40, 50, 60, 80, 100], pollutantScaleColors),
        legendRows: [
          { color: pollutantScaleColors[0], label: '0–40', band: 'ppb' },
          { color: pollutantScaleColors[1], label: '40–50', band: 'ppb' },
          { color: pollutantScaleColors[2], label: '50–60', band: 'ppb' },
          { color: pollutantScaleColors[3], label: '60–80', band: 'ppb' },
          { color: pollutantScaleColors[4], label: '80–100', band: 'ppb' },
          { color: pollutantScaleColors[5], label: '100+', band: 'ppb' }
        ],
        note: ''
      },

      no2: {
        label: 'NO2',
        getValue: latest => getPollutantValue(latest, 'no2'),
        getColor: value => colorFromBins(value, [20, 30, 40, 50], pollutantScaleColors),
        legendRows: [
          { color: pollutantScaleColors[0], label: '0–20', band: 'ppb' },
          { color: pollutantScaleColors[1], label: '20–30', band: 'ppb' },
          { color: pollutantScaleColors[3], label: '30–40', band: 'ppb' },
          { color: pollutantScaleColors[4], label: '40–50', band: 'ppb' },
          { color: pollutantScaleColors[5], label: '50+', band: 'ppb' }
        ],
        note: ''
      },

      no: {
        label: 'NO',
        getValue: latest => getPollutantValue(latest, 'no'),
        getColor: value => colorFromBins(value, [5, 10, 20, 40, 80], pollutantScaleColors),
        legendRows: [
          { color: pollutantScaleColors[0], label: '0–5', band: 'ppb' },
          { color: pollutantScaleColors[1], label: '5–10', band: 'ppb' },
          { color: pollutantScaleColors[2], label: '10–20', band: 'ppb' },
          { color: pollutantScaleColors[3], label: '20–40', band: 'ppb' },
          { color: pollutantScaleColors[4], label: '40–80', band: 'ppb' },
          { color: pollutantScaleColors[5], label: '80+', band: 'ppb' }
        ],
        note: ''
      },

      co: {
        label: 'CO',
        getValue: latest => getPollutantValue(latest, 'co'),
        getColor: value => colorFromBins(value, [1, 2, 3, 4], pollutantScaleColors),
        legendRows: [
          { color: pollutantScaleColors[0], label: '0–1', band: 'ppm' },
          { color: pollutantScaleColors[1], label: '1–2', band: 'ppm' },
          { color: pollutantScaleColors[3], label: '2–3', band: 'ppm' },
          { color: pollutantScaleColors[4], label: '3–4', band: 'ppm' },
          { color: pollutantScaleColors[5], label: '4+', band: 'ppm' }
        ],
        note: 'Example scale'
      },

      co2: {
        label: 'CO2',
        getValue: latest => getPollutantValue(latest, 'co2'),
        getColor: value => colorFromBins(value, [500, 600, 700, 800, 900], pollutantScaleColors),
        legendRows: [
          { color: pollutantScaleColors[0], label: '0–500', band: 'ppm' },
          { color: pollutantScaleColors[1], label: '500–600', band: 'ppm' },
          { color: pollutantScaleColors[2], label: '600–700', band: 'ppm' },
          { color: pollutantScaleColors[3], label: '700–800', band: 'ppm' },
          { color: pollutantScaleColors[4], label: '800–900', band: 'ppm' },
          { color: pollutantScaleColors[5], label: '900+', band: 'ppm' }
        ],
        note: ''
      }
    };

    const isDesktop = window.matchMedia('(min-width: 768px)').matches;
    let currentMode = 'aqhi';
    let legendCollapsed = false;
    let legendContainer = null;

    function renderLegend() {
      if (!legendContainer) return;

      const cfg = LAYER_CONFIG[currentMode];
      const helpLink = currentMode === 'aqhi'
        ? `
          <a class="legend-help"
             href="info.html#aqhi"
             aria-label="What is this colour scale? Learn more on the Info page.">
             What’s this?
          </a>
        `
        : '<span></span>';

      const rows = cfg.legendRows.map(row => `
        <div class="legend-row">
          <span class="swatch" style="background:${row.color}"></span>
          <span class="legend-value">${row.label}</span>
          <span class="legend-band">${row.band}</span>
        </div>
      `).join('');

      legendContainer.classList.toggle('is-collapsed', legendCollapsed);
      legendContainer.innerHTML = `
        <div class="legend-title">
          <button type="button"
                  class="legend-toggle"
                  aria-expanded="${String(!legendCollapsed)}"
                  aria-label="${legendCollapsed ? 'Expand legend' : 'Collapse legend'}">
            ${legendCollapsed ? '▸' : '▾'} ${cfg.label}
          </button>
          ${helpLink}
        </div>
        <div class="legend-body">
          <div class="legend-list" aria-label="${cfg.label} legend">
            ${rows}
          </div>
          ${cfg.note ? `<div class="legend-note">${cfg.note}</div>` : ''}
        </div>
      `;

      const btn = legendContainer.querySelector('.legend-toggle');
      btn.addEventListener('click', () => {
        legendCollapsed = !legendCollapsed;
        renderLegend();
      });
    }

    const legendControl = L.control({
      position: isDesktop ? 'topleft' : 'bottomright'
    });

    legendControl.onAdd = function () {
      legendContainer = L.DomUtil.create('div', 'aqhi-legend');
      L.DomEvent.disableClickPropagation(legendContainer);
      L.DomEvent.disableScrollPropagation(legendContainer);
      renderLegend();
      return legendContainer;
    };

    legendControl.addTo(map);

    getSensorData()
      .then(({ sensors, generated_at }) => {
        const stamp = document.getElementById('stamp');
        stamp.textContent = 'Last Updated ' + new Date(generated_at).toLocaleString();

        const layerGroups = {};
        const baseLayers = {};
        const layerToMode = new Map();

        Object.entries(LAYER_CONFIG).forEach(([mode, cfg]) => {
          const group = L.layerGroup();
          layerGroups[mode] = group;
          baseLayers[cfg.label] = group;
          layerToMode.set(group, mode);
        });

        sensors.forEach(sensor => {
          const { lat, lon, latest } = sensor;
          if (lat == null || lon == null) return;

          const popupHtml = `
            <b>${sensor.name ?? sensor.id}</b><br/>
            AQHI: ${latest?.aqhi ?? '—'}<br/>
            ${formatPrimaryPollutant(latest)}<br/>
            <small>${new Date(generated_at).toLocaleString()}</small>
          `;

          Object.entries(LAYER_CONFIG).forEach(([mode, cfg]) => {
            const value = cfg.getValue(latest);
            const color = cfg.getColor(value);

            const marker = L.circleMarker([lat, lon], {
              color,
              fillColor: color,
              fillOpacity: 0.85,
              radius: 8,
              weight: 1
            });

            marker.bindPopup(popupHtml);
            marker.addTo(layerGroups[mode]);
          });
        });

        layerGroups.aqhi.addTo(map);

        L.control.layers(baseLayers, null, {
          collapsed: !isDesktop,
          position: 'topright'
        }).addTo(map);

        map.on('baselayerchange', e => {
          const mode = layerToMode.get(e.layer);
          if (!mode) return;
          currentMode = mode;
          renderLegend();
        });

        document.title += ` – updated ${new Date(generated_at).toLocaleTimeString()}`;
      })
      .catch(err => {
        console.error(err);
        document.getElementById('stamp').textContent = '⚠ Unable to fetch latest data';
        alert('Unable to load pollutant_data.json');
      });
  </script>

  <!-- Hamburger toggle -->
  <script src="js/menu.js" defer></script>
</body>
</html>
